enum ProgressVerdict {
	progressive
	close_to_achievement
	achieved
	regressing
}

type ProgressRating {
	id: ID!
	coachId: ID!
	coach: User
	clientId: ID!
	client: User
	goalId: ID!
	goal: Goal
	startDate: String!
	endDate: String!
	rating: Int!
	comment: String!
	verdict: ProgressVerdict!
	sessionLogIds: [ID!]!
	sessionLogs: [SessionLog!]
	createdAt: String
	updatedAt: String
}

input CreateProgressRatingInput {
	clientId: ID!
	goalId: ID!
	startDate: String!
	endDate: String!
	rating: Int!
	comment: String!
	verdict: ProgressVerdict!
	sessionLogIds: [ID!]!
}

input UpdateProgressRatingInput {
	rating: Int
	comment: String
	verdict: ProgressVerdict
	sessionLogIds: [ID!]
}

extend type Query {
	# Get progress ratings for a client and goal
	getProgressRatings(clientId: ID!, goalId: ID!): [ProgressRating!]!
	# Get all progress ratings for a client
	getClientProgressRatings(clientId: ID!): [ProgressRating!]!
	# Get all progress ratings created by a coach
	getCoachProgressRatings(coachId: ID!): [ProgressRating!]!
	# Get session logs for a client within a date range for a specific goal
	getSessionLogsForRating(
		clientId: ID!
		goalId: ID!
		startDate: String!
		endDate: String!
	): [SessionLog!]!
}

extend type Mutation {
	# Create a progress rating
	createProgressRating(input: CreateProgressRatingInput!): ProgressRating!
	# Update a progress rating
	updateProgressRating(id: ID!, input: UpdateProgressRatingInput!): ProgressRating!
	# Delete a progress rating
	deleteProgressRating(id: ID!): Boolean!
}

