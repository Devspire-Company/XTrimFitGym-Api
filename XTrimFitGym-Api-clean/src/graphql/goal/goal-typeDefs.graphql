# Goal types
# FitnessGoalType is now a String type - predefined values are managed in config/fitness-goal-types.ts
# Predefined values: Weight loss, Muscle building, General fitness, Strength training, Endurance, Flexibility, Rehabilitation, Athletic Performance

type Goal {
	id: ID!
	clientId: ID!
	client: User # Populated client details
	coachId: ID # Coach assigned to help with this goal
	coach: User # Populated coach details
	goalType: String! # String type - can be any value, predefined values in config
	title: String!
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
	status: GoalStatus!
	createdAt: String
	updatedAt: String
}

enum GoalStatus {
	active
	completed
	paused
	cancelled
}

input CreateGoalInput {
	goalType: String! # String type - can be any value, predefined values in config
	title: String!
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
}

input UpdateGoalInput {
	goalType: String # String type - can be any value, predefined values in config
	title: String
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
	status: GoalStatus
}

# Weight progress data point
type WeightProgress {
	date: String!
	weight: Float!
	sessionId: ID
	sessionLogId: ID
}

# Extend Query type
extend type Query {
	# Get goals for a client
	getGoals(clientId: ID!, status: GoalStatus): [Goal!]!
	# Get goal by ID
	getGoal(id: ID!): Goal
	# Get all client goals (for coaches to see and pick)
	getAllClientGoals(coachId: ID!, status: GoalStatus): [Goal!]!
	# Get weight progress chart data
	getWeightProgressChart(clientId: ID!, goalId: ID): [WeightProgress!]!
	# Get predefined fitness goal types (for dropdowns/selects)
	getFitnessGoalTypes: [String!]!
}

# Extend Mutation type
extend type Mutation {
	# Create a new goal (member only, requires active membership)
	createGoal(input: CreateGoalInput!): Goal!
	# Update a goal
	updateGoal(id: ID!, input: UpdateGoalInput!): Goal!
	# Delete a goal
	deleteGoal(id: ID!): Boolean!
	# Assign coach to a goal (coach picks a goal to help with)
	assignCoachToGoal(goalId: ID!): Goal!
}

