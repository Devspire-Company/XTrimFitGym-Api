# Session types
type Session {
	id: ID!
	coachId: ID!
	coach: User # Populated coach details
	clientsIds: [ID!]!
	clients: [User!] # Populated client details
	name: String! # Workout name (e.g., "Chest", "Back", "Leg Day")
	workoutType: String
	date: String!
	startTime: String!
	endTime: String
	time: String # For backwards compatibility
	gymArea: String!
	note: String
	status: SessionStatus!
	templateId: ID # Reference to template session if created from template
	goalId: ID # Link to goal this session is helping achieve
	goal: Goal # Populated goal details
	isTemplate: Boolean # Whether this session is a reusable template
	createdAt: String
	updatedAt: String
}

enum SessionStatus {
	scheduled
	completed
	cancelled
}

# Session input
input CreateSessionInput {
	clientsIds: [ID!]!
	name: String!
	workoutType: String
	date: String!
	startTime: String!
	endTime: String
	gymArea: String!
	note: String
	templateId: ID # If creating from template, reference template session
	goalId: ID # Link to goal this session is helping achieve
	isTemplate: Boolean # Whether to create as a reusable template
}

input UpdateSessionInput {
	name: String
	workoutType: String
	date: String
	startTime: String
	endTime: String
	gymArea: String
	note: String
	status: SessionStatus
}

# Progress Images type
type ProgressImages {
	front: String
	rightSide: String
	leftSide: String
	back: String
}

# Session Log types (for completed sessions with weight tracking)
type SessionLog {
	id: ID!
	sessionId: ID!
	session: Session # Populated session details
	clientId: ID!
	client: User # Populated client details
	coachId: ID!
	coach: User # Populated coach details
	weight: Float # Optional - only required for weight-related goals
	progressImages: ProgressImages # Progress images taken at session completion
	clientConfirmed: Boolean!
	coachConfirmed: Boolean!
	notes: String
	completedAt: String
	createdAt: String
	updatedAt: String
}

input ProgressImagesInput {
	front: String
	rightSide: String
	leftSide: String
	back: String
}

input CreateSessionLogInput {
	sessionId: ID!
	weight: Float # Optional - only required for weight-related goals
	progressImages: ProgressImagesInput! # Required - must upload 4 images (front, rightSide, leftSide, back)
	notes: String
}

input ConfirmSessionCompletionInput {
	sessionLogId: ID!
	confirm: Boolean!
}

# Extend Query type
extend type Query {
	# Get sessions for a coach
	getCoachSessions(coachId: ID!, status: SessionStatus): [Session!]!
	# Get sessions for a client/member
	getClientSessions(clientId: ID!, status: SessionStatus): [Session!]!
	# Get upcoming sessions for current user
	getUpcomingSessions: [Session!]!
	# Get session by ID
	getSession(id: ID!): Session
	# Get session templates (reusable sessions)
	getSessionTemplates(coachId: ID!): [Session!]!
	# Get session logs for a client
	getSessionLogs(clientId: ID!): [SessionLog!]!
	# Get session logs for a coach (all sessions they've coached)
	getCoachSessionLogs(coachId: ID!): [SessionLog!]!
	# Get session log by session ID (for coaches to view specific session progress)
	getSessionLogBySessionId(sessionId: ID!): SessionLog
	# Get weight progress for a client
	getWeightProgress(clientId: ID!, goalId: ID): [SessionLog!]!
}

# Extend Mutation type
extend type Mutation {
	# Create a new session (coach only)
	createSession(input: CreateSessionInput!): Session!
	# Create a session from template (coach only)
	createSessionFromTemplate(input: CreateSessionFromTemplateInput!): Session!
	# Update a session (coach only)
	updateSession(id: ID!, input: UpdateSessionInput!): Session!
	# Cancel a session
	cancelSession(id: ID!): Boolean!
	# Complete session - create session log with weight
	completeSession(input: CreateSessionLogInput!): SessionLog!
	# Confirm session completion (coach confirms)
	confirmSessionCompletion(input: ConfirmSessionCompletionInput!): SessionLog!
	# Client confirms they entered weight
	clientConfirmWeight(sessionLogId: ID!): SessionLog!
}

# Input for creating session from template
input CreateSessionFromTemplateInput {
	templateId: ID! # Template session ID
	clientsIds: [ID!]! # Clients for this instance
	date: String! # Date for this instance
	startTime: String! # Start time for this instance
	endTime: String # End time for this instance
	goalId: ID # Link to goal
}

