enum WalkInGender {
	MALE
	FEMALE
	NON_BINARY
	PREFER_NOT_TO_SAY
}

type WalkInClient {
	id: ID!
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
	createdAt: String!
	updatedAt: String!
}

type WalkInAttendanceLog {
	id: ID!
	walkInClient: WalkInClient!
	timedInAt: String!
	localDate: String!
	createdAt: String!
}

type WalkInLogsConnection {
	logs: [WalkInAttendanceLog!]!
	totalCount: Int!
}

type WalkInAccountRow {
	client: WalkInClient!
	"""Total number of time-in attendance records for this walk-in profile."""
	timeInCount: Int!
}

type WalkInAccountsOverview {
	"""Total walk-in profiles in the system."""
	totalWalkInAccounts: Int!
	"""Total time-in log rows across all walk-ins."""
	totalTimeInRecords: Int!
	rows: [WalkInAccountRow!]!
}

type WalkInStats {
	totalWalkInAccounts: Int!
	totalTimeInRecords: Int!
}

input CreateWalkInClientInput {
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
}

input UpdateWalkInClientInput {
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
}

input WalkInLogsFilter {
	"""YYYY-MM-DD (Asia/Manila calendar date)"""
	date: String!
}

input WalkInPagination {
	limit: Int
	offset: Int
}

type CreateWalkInClientResult {
	client: WalkInClient!
	log: WalkInAttendanceLog
}

extend type Query {
	"""Search by name/phone/email, or pass an empty query to list all walk-ins (admin, paginated)."""
	searchWalkInClients(query: String, limit: Int, offset: Int): [WalkInClient!]!
	"""System-wide walk-in profile and time-in counts (admin)."""
	walkInStats: WalkInStats!
	walkInAttendanceLogs(
		filter: WalkInLogsFilter!
		pagination: WalkInPagination
	): WalkInLogsConnection!
	"""All time-in logs for one walk-in client (newest first)."""
	walkInLogsByClient(
		walkInClientId: ID!
		pagination: WalkInPagination
	): WalkInLogsConnection!
	"""All walk-in profiles with per-profile time-in counts (paginated, newest updated first)."""
	walkInAccountsOverview(pagination: WalkInPagination): WalkInAccountsOverview!
}

extend type Mutation {
	createWalkInClient(
		input: CreateWalkInClientInput!
		timeInNow: Boolean!
	): CreateWalkInClientResult!
	updateWalkInClient(
		walkInClientId: ID!
		input: UpdateWalkInClientInput!
	): WalkInClient!
	walkInTimeIn(walkInClientId: ID!, at: String): WalkInAttendanceLog!
}
