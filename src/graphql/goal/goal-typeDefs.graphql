# Goal types
enum FitnessGoalType {
	WEIGHT_LOSS
	MUSCLE_BUILDING
	GENERAL_FITNESS
	STRENGTH_TRAINING
	ENDURANCE
	FLEXIBILITY
	ATHLETIC_PERFORMANCE
	REHABILITATION
}

type Goal {
	id: ID!
	clientId: ID!
	client: User # Populated client details
	goalType: FitnessGoalType!
	title: String!
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
	status: GoalStatus!
	createdAt: String
	updatedAt: String
}

enum GoalStatus {
	active
	completed
	paused
	cancelled
}

input CreateGoalInput {
	goalType: FitnessGoalType!
	title: String!
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
}

input UpdateGoalInput {
	goalType: FitnessGoalType
	title: String
	description: String
	targetWeight: Float
	currentWeight: Float
	targetDate: String
	status: GoalStatus
}

# Weight progress data point
type WeightProgress {
	date: String!
	weight: Float!
	sessionId: ID
	sessionLogId: ID
}

# Extend Query type
extend type Query {
	# Get goals for a client
	getGoals(clientId: ID!, status: GoalStatus): [Goal!]!
	# Get goal by ID
	getGoal(id: ID!): Goal
	# Get weight progress chart data
	getWeightProgressChart(clientId: ID!, goalId: ID): [WeightProgress!]!
}

# Extend Mutation type
extend type Mutation {
	# Create a new goal (member only, requires active membership)
	createGoal(input: CreateGoalInput!): Goal!
	# Update a goal
	updateGoal(id: ID!, input: UpdateGoalInput!): Goal!
	# Delete a goal
	deleteGoal(id: ID!): Boolean!
}

