enum RoleType {
	admin
	coach
	member
}

type MemberDetails {
	membershipId: ID
	physiqueGoalType: String!
	fitnessGoal: [String!]
	workOutTime: [String]
	coachesIds: [ID]
}

type CoachDetails {
	clientsIds: [ID]
	sessionsIds: [ID]
	specialization: [String!]
	ratings: Float
	yearsOfExperience: Int
	moreDetails: String
	teachingDate: [String]
	teachingTime: [String]
}

# Main User type
type User {
	id: ID!
	firstName: String!
	lastName: String!
	email: String!
	role: RoleType!
	phoneNumber: String
	dateOfBirth: String
	gender: String!
	heardFrom: [String]
	agreedToTermsAndConditions: Boolean
	agreedToPrivacyPolicy: Boolean
	agreedToLiabilityWaiver: Boolean
	membershipDetails: MemberDetails
	coachDetails: CoachDetails
	createdAt: String
	updatedAt: String
}

# Input types for mutations
input MemberDetailsInput {
	membershipId: ID
	physiqueGoalType: String!
	fitnessGoal: [String!]
	workOutTime: [String]
	coachesIds: [ID]
}

input CoachDetailsInput {
	clientsIds: [ID]
	sessionsIds: [ID]
	specialization: [String!]
	ratings: Float
	yearsOfExperience: Int
	moreDetails: String
	teachingDate: [String]
	teachingTime: [String]
}

input CreateUserInput {
	firstName: String!
	lastName: String!
	email: String!
	password: String!
	role: RoleType!
	phoneNumber: String
	dateOfBirth: String
	gender: String
	heardFrom: [String]
	agreedToTermsAndConditions: Boolean
	agreedToPrivacyPolicy: Boolean
	agreedToLiabilityWaiver: Boolean
	membershipDetails: MemberDetailsInput
	coachDetails: CoachDetailsInput
}

# Queries
type Query {
	getUser(id: ID!): User
	getUsers(role: RoleType): [User]
}

# Mutations
type Mutation {
	createUser(input: CreateUserInput!): User
	updateUser(id: ID!, input: CreateUserInput!): User
	deleteUser(id: ID!): Boolean
}
