enum RoleType {
	admin
	coach
	member
}

type MemberDetails {
	membershipId: ID
	physiqueGoalType: String!
	fitnessGoal: [String!]
	workOutTime: [String]
	coachesIds: [ID]
	hasEnteredDetails: Boolean
}

type CoachDetails {
	clientsIds: [ID]
	sessionsIds: [ID]
	specialization: [String!]
	ratings: Float
	yearsOfExperience: Int
	moreDetails: String
	teachingDate: [String]
	teachingTime: [String]
	clientLimit: Int
}

# Main User type
type LoginHistoryEntry {
	ipAddress: String
	userAgent: String
	loginAt: String
}

type User {
	id: ID!
	firstName: String!
	middleName: String
	lastName: String!
	email: String!
	role: RoleType!
	phoneNumber: String
	dateOfBirth: String
	gender: String!
	heardFrom: [String]
	agreedToTermsAndConditions: Boolean
	agreedToPrivacyPolicy: Boolean
	agreedToLiabilityWaiver: Boolean
	attendanceId: Int
	membershipDetails: MemberDetails
	coachDetails: CoachDetails
	loginHistory: [LoginHistoryEntry]
	createdAt: String
	updatedAt: String
}

# Input types for mutations
input MemberDetailsInput {
	membershipId: ID
	physiqueGoalType: String!
	fitnessGoal: [String!]
	workOutTime: [String]
	coachesIds: [ID]
	hasEnteredDetails: Boolean
}

input CoachDetailsInput {
	clientsIds: [ID]
	sessionsIds: [ID]
	specialization: [String!]
	ratings: Float
	yearsOfExperience: Int
	moreDetails: String
	teachingDate: [String]
	teachingTime: [String]
	clientLimit: Int
}

input CreateUserInput {
	firstName: String!
	middleName: String
	lastName: String!
	email: String!
	password: String!
	role: RoleType!
	phoneNumber: String
	dateOfBirth: String
	gender: String
	heardFrom: [String]
	agreedToTermsAndConditions: Boolean
	agreedToPrivacyPolicy: Boolean
	agreedToLiabilityWaiver: Boolean
	membershipDetails: MemberDetailsInput
	coachDetails: CoachDetailsInput
	currentPassword: String
}

input UpdateUserInput {
	firstName: String
	middleName: String
	lastName: String
	email: String
	password: String
	currentPassword: String
	phoneNumber: String
	dateOfBirth: String
	gender: String
	heardFrom: [String]
	agreedToTermsAndConditions: Boolean
	agreedToPrivacyPolicy: Boolean
	agreedToLiabilityWaiver: Boolean
	membershipDetails: MemberDetailsInput
	coachDetails: CoachDetailsInput
}

# Queries
type Query {
	"""Current user from Authorization (JWT or Clerk session token)."""
	me: User
	getUser(id: ID!): User
	getUsers(role: RoleType): [User]
}

# Login input
input LoginInput {
	email: String!
	password: String!
}

# Auth response
type AuthResponse {
	user: User!
	token: String!
}

# Mutations
type Mutation {
	login(input: LoginInput!): AuthResponse!
	createUser(input: CreateUserInput!): AuthResponse!
	updateUser(id: ID!, input: UpdateUserInput!): User
	deleteUser(id: ID!): Boolean
	removeClient(clientId: ID!): Boolean!
}

# Subscriptions
type Subscription {
	# Base subscription type - extended in other modules
	# This field is required as GraphQL doesn't allow empty types
	_empty: Boolean
}