# Analytics types for admin dashboard
type Analytics {
	id: ID!
	date: String!
	totalRevenue: Float!
	activeSubscriptions: Int!
	newSubscriptions: Int!
	canceledSubscriptions: Int!
	expiredSubscriptions: Int!
	revenueByMembership: [MembershipRevenue!]!
	createdAt: String
	updatedAt: String
}

type MembershipRevenue {
	membershipId: ID!
	membershipName: String!
	revenue: Float!
	count: Int!
}

type RevenueSummary {
	totalRevenue: Float!
	activeSubscriptions: Int!
	newSubscriptions: Int!
	canceledSubscriptions: Int!
	expiredSubscriptions: Int!
	revenueByMembership: [MembershipRevenue!]!
	revenueByPeriod: [PeriodRevenue!]!
}

type PeriodRevenue {
	period: String!
	revenue: Float!
	count: Int!
}

input DateRangeInput {
	startDate: String!
	endDate: String!
}

# Extend Query type
extend type Query {
	# Get analytics for a specific date
	getAnalytics(date: String!): Analytics
	# Get revenue summary (all time or date range)
	getRevenueSummary(dateRange: DateRangeInput): RevenueSummary!
	# Get analytics for a date range
	getAnalyticsRange(dateRange: DateRangeInput!): [Analytics!]!
}

