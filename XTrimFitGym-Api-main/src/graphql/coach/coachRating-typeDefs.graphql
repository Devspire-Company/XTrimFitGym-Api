type CoachRating {
	id: ID!
	coachId: ID!
	coach: User
	clientId: ID!
	client: User
	sessionLogId: ID!
	sessionLog: SessionLog
	rating: Int! # 1-5 scale
	comment: String
	createdAt: String
	updatedAt: String
}

input CreateCoachRatingInput {
	coachId: ID!
	sessionLogId: ID!
	rating: Int! # 1-5 scale
	"""Written feedback (minimum length enforced server-side)."""
	comment: String
}

extend type Query {
	# Get all ratings for a coach
	getCoachRatings(coachId: ID!): [CoachRating!]!
	# Get rating for a specific session log
	getCoachRatingBySessionLog(sessionLogId: ID!): CoachRating
	# Coach ratings the current member submitted for sessions tied to this goal
	getMyCoachRatingsForGoal(goalId: ID!): [CoachRating!]!
}

extend type Mutation {
	# Create a coach rating
	createCoachRating(input: CreateCoachRatingInput!): CoachRating!
	# Update a coach rating
	updateCoachRating(id: ID!, rating: Int, comment: String): CoachRating!
	# Delete a coach rating
	deleteCoachRating(id: ID!): Boolean!
}

