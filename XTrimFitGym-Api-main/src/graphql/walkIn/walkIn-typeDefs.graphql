enum WalkInGender {
	MALE
	FEMALE
	NON_BINARY
	PREFER_NOT_TO_SAY
}

type WalkInClient {
	id: ID!
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
	"""Set when this walk-in row is synced from a registered member app account."""
	linkedUserId: ID
	createdAt: String!
	updatedAt: String!
}

"""Member-facing walk-in desk status (auth: member only)."""
type MemberWalkInStatus {
	registered: Boolean!
	walkInClient: WalkInClient
	timeInCount: Int!
	lastTimedInAt: String
}

type WalkInAttendanceLog {
	id: ID!
	walkInClient: WalkInClient!
	timedInAt: String!
	localDate: String!
	"""Walk-in fee (PHP) recorded at time-in."""
	payment: Float!
	createdAt: String!
}

type WalkInPaymentSettings {
	"""Default PHP amount applied to each new time-in (admin-configurable)."""
	defaultPaymentPesos: Float!
}

type WalkInLogsConnection {
	logs: [WalkInAttendanceLog!]!
	totalCount: Int!
}

type WalkInAccountRow {
	client: WalkInClient!
	"""Total number of time-in attendance records for this walk-in profile."""
	timeInCount: Int!
}

type WalkInAccountsOverview {
	"""Total walk-in profiles in the system."""
	totalWalkInAccounts: Int!
	"""Total time-in log rows across all walk-ins."""
	totalTimeInRecords: Int!
	rows: [WalkInAccountRow!]!
}

type WalkInStats {
	totalWalkInAccounts: Int!
	totalTimeInRecords: Int!
}

input CreateWalkInClientInput {
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
}

input UpdateWalkInClientInput {
	firstName: String!
	middleName: String
	lastName: String!
	phoneNumber: String
	email: String
	gender: WalkInGender!
	notes: String
}

input WalkInLogsFilter {
	"""YYYY-MM-DD (Asia/Manila calendar date)"""
	date: String!
}

input WalkInPagination {
	limit: Int
	offset: Int
}

type CreateWalkInClientResult {
	client: WalkInClient!
	log: WalkInAttendanceLog
}

extend type Query {
	"""Search by name/phone/email, or pass an empty query to list all walk-ins (admin, paginated)."""
	searchWalkInClients(query: String, limit: Int, offset: Int): [WalkInClient!]!
	"""System-wide walk-in profile and time-in counts (admin)."""
	walkInStats: WalkInStats!
	walkInAttendanceLogs(
		filter: WalkInLogsFilter!
		pagination: WalkInPagination
	): WalkInLogsConnection!
	"""All time-in logs for one walk-in client (newest first)."""
	walkInLogsByClient(
		walkInClientId: ID!
		pagination: WalkInPagination
	): WalkInLogsConnection!
	"""All walk-in profiles with per-profile time-in counts (paginated, newest updated first)."""
	walkInAccountsOverview(pagination: WalkInPagination): WalkInAccountsOverview!
	"""Default walk-in time-in fee in PHP (admin)."""
	walkInPaymentSettings: WalkInPaymentSettings!
	"""Whether this member appears on the admin walk-in list and recent time-ins (member only)."""
	myMemberWalkInStatus: MemberWalkInStatus!
}

extend type Mutation {
	createWalkInClient(
		input: CreateWalkInClientInput!
		timeInNow: Boolean!
	): CreateWalkInClientResult!
	updateWalkInClient(
		walkInClientId: ID!
		input: UpdateWalkInClientInput!
	): WalkInClient!
	walkInTimeIn(walkInClientId: ID!, at: String): WalkInAttendanceLog!
	updateWalkInPaymentSettings(paymentPesos: Float!): WalkInPaymentSettings!
	"""
	Sync the current member's profile into the admin walk-in directory (name, email, phone)
	so staff can find them by search. Call after try-out onboarding or when data changes.
	"""
	syncMyWalkInProfile: WalkInClient!
}
